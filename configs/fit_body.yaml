dataset: dynamic_body

parameters:
  glucose_mgdl_scale: {guess: 1.25, bounds: [0.5, 2.0]}
  k_export_glucose: {guess: -1.3, bounds: [-3, 1]}
  k_hgp_base: {guess: -2.0, bounds: [-4, 0]}
  k_hgp_pyr: {guess: -1.5, bounds: [-4, 0]}
  k_hgp_aa: {guess: -1.5, bounds: [-4, 0]}
  k_clear_base: {guess: -2.0, bounds: [-4, 0]}
  k_clear_ins: {guess: -1.0, bounds: [-4, 0]}
  k_pyr_uptake: {guess: -1.0, bounds: [-4, 0]}
  k_pyr_clear: {guess: -2.0, bounds: [-4, 0]}
  k_AA_liver_uptake: {guess: -1.0, bounds: [-4, 0]}
  k_ketogenesis: {guess: -2.0, bounds: [-4, 0]}
  k_ketone_clearance: {guess: -1.0, bounds: [-4, 0]}
  k_AA_release_fasting: {guess: -1.5, bounds: [-4, 0]}
  k_succ_appearance: {guess: -2.0, bounds: [-4, 0]}
  k_I_decay: {guess: -1.0, bounds: [-4, 0]}

observables:
  GTT: G_mgdl
  GTT_female: G_mgdl
  ITT: G_mgdl
  ITT_female: G_mgdl
  PTT: G_mgdl
  PTT_female: G_mgdl
  fasting_glucose: G_mgdl
  fasting_ketone: Ketone_plasma

weights:
  GTT: 1.0
  GTT_female: 1.0
  ITT: 1.0
  ITT_female: 1.0
  PTT: 1.0
  PTT_female: 1.0
  fasting_glucose: 0.5
  fasting_ketone: 0.5

optimiser:
  method: hybrid_de_l_bfgs_b
  local_method: L-BFGS-B
  loss: soft_l1
  f_scale: 1.0
  global_max_iter: 80
  popsize: 8
  max_iter: 2000
  polish: true
  n_starts: 10
  random_seed: 42

